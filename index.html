        <h1>Wealth in Congress</h1>
        <p><strong>Members of Congress from both parties enter public service and leave substantially wealthier.</strong></p>
        
        <h2>What This Tool Tracks</h2>
        <p>Wealth in Congress is a nonpartisan civic accountability tool covering all 540 members of the 119th U.S. Congress (100 Senate + 440 House). For each member, it shows:</p>
        <p>Net worth at entry to Congress vs. current net worth, computed from financial disclosure filings filed with the Senate EFDS and House Clerk. Values use midpoint estimates from the reported ranges (e.g., "$100,001 to $250,000" becomes $175,000).</p>
        <p>Annualized wealth growth rates compared to an S&amp;P 500 benchmark over the same period. About half of members with comparable data (2+ years in office) match or beat the S&amp;P 500 on an annualized basis. Much of this outperformance comes from real estate, business income, and freshmen with short track records rather than stock-picking skill.</p>
        <p>STOCK Act periodic transaction reports for 39 actively trading members, with sector classification and filing delay analysis.</p>
        <p>Committee assignments for 538 members, mapped to regulated industry sectors to identify potential conflicts of interest.</p>
        <p>FEC campaign finance data for 511 members including total raised, PAC contributions, and top donor industries.</p>
        <p>Outside earned income (Schedule C) for 223 members including salaries, pensions, consulting fees, book royalties, board compensation, and other income over $200.</p>
        <p>Outside positions held (Schedule D) for 256 members including corporate directorships, nonprofit board seats, business partnerships, trust roles, and other positions held outside the U.S. Government.</p>
        <p>Triple overlap analysis flags members where personal financial holdings, active stock trades, AND campaign donors all align with the industries their committees regulate.</p>
        
        <h2>Key Findings</h2>
        <p>About half of members with 2+ years in office match or beat the S&amp;P 500 on an annualized basis. The median veteran member roughly tracks the benchmark. Most congressional wealth accumulation comes from real estate, business interests, spousal income, and pre-existing wealth rather than stock-picking skill.</p>
        <p>Both parties show similar patterns. Median wealth growth rates for Democrats and Republicans are comparable, and the distribution of above-benchmark performers is roughly even.</p>
        <p>509 of 540 members have gain data (entry and current net worth from separate filings). 31 members have only one filing available, typically because they entered Congress recently.</p>
        
        <h2>Data Sources</h2>
        <p>All data is derived from public sources: U.S. Senate Electronic Financial Disclosure System (EFDS), U.S. House of Representatives Clerk financial disclosure filings, Federal Election Commission (FEC) campaign finance reports, U.S. Census Bureau TIGER/Line cartographic boundary files for 119th Congress district boundaries, and Congressional Bioguide for member photographs.</p>
        
        <h2>Methodology</h2>
        <p>Net worth is calculated as total assets minus total liabilities using midpoint estimates from disclosure ranges. Assets reported as "Over $50,000,000" use $50M as a floor, meaning the wealthiest members are systematically underestimated. Annualized returns use CAGR: (current/entry)^(1/years) minus 1. Members with zero or negative entry net worth show dollar gains but percentage returns are listed as N/A. The S&amp;P 500 benchmark uses total return index values matched to each member's entry year. Spousal assets are included per standard financial disclosure methodology.</p>
        
        <p>This tool is free, open, requires no login, and has no advertising. Visit <a href="https://wealthincongress.com">wealthincongress.com</a> with JavaScript enabled for the full interactive experience.</p>
